<!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/3/w3.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.6.3/css/font-awesome.min.css">


<head>
    <meta charset="UTF-8">
    <title>Matthew Ding - Photo Album</title>
    <link rel="icon" href="../favicon.ico">

    <style>
        div {
            max-width: 500px;
            margin: auto;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            Padding: 10px 10px 0px 10px;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <nav class="w3-bar w3-black">
        <a href="../" class="w3-button w3-bar-item">Home</a>
        <a href="../projects/" class="w3-button w3-bar-item">Projects</a>
        <a href="../blog/" class="w3-button w3-bar-item">Blog</a>
        <a href="../album/" class="w3-button w3-bar-item">Photo Album</a>
        <a href="../about/" class="w3-button w3-bar-item">About</a>
    </nav>

    <header class = "w3-container w3-blue">
        <h1 class="w3-center">Photo Album</h1>
    </header>

    <!-- Rocky Picture -->
    <div class="w3-card-4">
        <img src="rocky.jpeg" alt="Cute Dog">
        <div class="w3-container w3-center">
            <p>A cute dog (with an even cuter owner)</p>
        </div>
    </div>
    <br><br>

    <!-- Picture of me -->
    <div class="w3-card-4">
        <img src="campanile.jpg" alt="Me at campanile">
        <div class="w3-container w3-center">
            <p>Me in front of Sather Tower, UC Berkeley</p>
        </div>
    </div>

    <br><br>
    <div class="w3-card-4">
        <img src="graduation.jpg" alt="Graduation">
        <div class="w3-container w3-center">
            <p>Graduation Photo</p>
        </div>
    </div>
    <br><br>
    <div class="w3-card-4">
        <img src="skyline.jpg" alt="Skyline">
        <div class="w3-container w3-center">
            <p>Boston Night Skyline</p>
        </div>
    </div>
    <br><br>
    <div class="w3-card-4">
        <img src="fireworks1.jpeg" alt="Fireworks 1"><br>
        <img src="fireworks2.jpeg" alt="Fireworks 2"><br>
        <img src="fireworks3.jpeg" alt="Fireworks 3">
        <div class="w3-container w3-center">
            <p>July 4th Fireworks, Boston Common</p>
        </div>
    </div>
    <br><br>

    <!-- Footer -->
    <footer class="w3-container w3-padding-16 w3-center w3-black w3-xlarge">
        <a href="mailto:matthewding@berkeley.edu" target="_blank"><i class="fa fa-envelope"></i></a>
        <a href="https://www.facebook.com/matthewding2/" target="_blank"><i class="fa fa-facebook-official"></i></a>
        <a href="https://twitter.com/MatthewDing1" target="_blank"><i class="fa fa-twitter"></i></a>
        <a href="https://www.instagram.com/matthew_ding1/" target="_blank"><i class="fa fa-instagram"></i></a>
        <a href="https://github.com/matthew-ding" target="_blank"><i class="fa fa-github"></i></a>
        <a href="https://www.linkedin.com/in/matthew-ding-247151216" target="_blank"><i class="fa fa-linkedin"></i></a>
      <br>
      <p style="font-size: 10px">Copyright &copy; 2021, Matthew Ding. All Rights Reserved.</p>
    </footer>
</body>
</html>
