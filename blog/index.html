<!doctype html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/3/w3.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.6.3/css/font-awesome.min.css">

<head>
    <meta charset="UTF-8">
    <title>Matthew Ding - Home</title>
    <link rel="icon" href="../favicon.ico">

    <!-- CSS -->
    <style>
        body, header, h1, h2, h3, h4 {
          font-family: Georgia;
        }

        div {
            margin: auto;
        }

        /* The side navigation menu */
        .sidebar {
            margin: 0;
            padding: 0;
            width: 200px;
            background: #333;
            position: fixed;
            height: 100%;
            overflow: auto;
        }

        header, footer {
            width: 100%;
            background: #333;
            color: #fff;
        }

        /* Sidebar links */
        .sidebar a {
            background: #333;
            display: block;
            color: #fff;
            padding: 16px;
            text-decoration: none;
        }

        /* Links on mouse-over */
        .sidebar a:hover:not(.active) {
            background-color: #555;
            color: white;
        }

        /* Page content. The value of the margin-left property should match the value of the sidebar's width property */
        div.content {
            margin-left: 200px;
            padding: 1px 16px;
            height: auto;
        }

        /* On screens that are less than 700px wide, make the sidebar into a topbar */
        @media screen and (max-width: 700px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .sidebar a {
                float: left;
            }

            div.content {
                margin-left: 0;
            }
        }

        /* On screens that are less than 400px, display the bar vertically, instead of horizontally */
        @media screen and (max-width: 400px) {
            .sidebar a {
                text-align: center;
                float: none;
            }
        }

        .w3-container {
            max-width: 800px;
        }
    </style>
</head>


<body>
<!-- Header -->
<nav class="sidebar">
    <a href="../" class="w3-button w3-bar-item">Home</a>
    <a href="../projects/" class="w3-button w3-bar-item">Projects</a>

    <a href="../album/" class="w3-button w3-bar-item">Photo Album</a>
    <a href="../about/" class="w3-button w3-bar-item">About</a>
</nav>
